[build]
  base = "the-village-hub"
  publish = "."

[functions]
  directory = "netlify/functions"

[[redirects]]
  from = "/villagestay-welcome"
  to = "https://village-stay-welcome.netlify.app/"
  status = 200
  force = true

[[redirects]]
  from = "/villagestay-welcome/*"
  to = "https://village-stay-welcome.netlify.app/:splat"
  status = 200
  force = true
